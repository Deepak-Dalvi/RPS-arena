<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Paper Scissors Arena</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d1117; --bg2:#161b22; --bg3:#1c2333; --bg4:#21262d;
  --border:#30363d; --accent:#00e5ff; --green:#00e676; --red:#ff1744;
  --gold:#ffd600; --text:#e6edf3; --muted:#7d8590;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden;}

.page{display:none;min-height:100vh;}
.page.active{display:flex;}

/* ══ AUTH ══ */
#page-auth{
  align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 30% 20%,#0a2a3a 0%,#0d1117 60%),
             radial-gradient(ellipse at 80% 80%,#1a0a2e 0%,transparent 50%);
}
#page-auth::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(0,229,255,.03) 40px,rgba(0,229,255,.03) 41px),
                   repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(0,229,255,.03) 40px,rgba(0,229,255,.03) 41px);
}
.auth-card{
  background:rgba(22,27,34,0.97);border:1px solid rgba(0,229,255,.2);
  border-radius:20px;padding:48px 40px;width:420px;max-width:95vw;
  box-shadow:0 0 60px rgba(0,229,255,.08);animation:fadeUp .5s ease;position:relative;z-index:1;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
.logo-wrap{text-align:center;margin-bottom:32px;}
.logo-icon{
  width:80px;height:80px;margin:0 auto 16px;
  background:linear-gradient(135deg,#00e5ff,#7c4dff);border-radius:20px;
  display:flex;align-items:center;justify-content:center;font-size:42px;
  box-shadow:0 8px 32px rgba(0,229,255,.3);animation:pulse 3s ease-in-out infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 8px 32px rgba(0,229,255,.3)}50%{box-shadow:0 8px 48px rgba(0,229,255,.6)}}
.logo-title{font-family:'Orbitron',monospace;font-size:19px;font-weight:900;letter-spacing:2px;color:var(--accent);line-height:1.4;}
.logo-sub{color:var(--muted);font-size:12px;letter-spacing:2px;margin-top:6px;}
.tab-row{display:flex;background:var(--bg4);border-radius:10px;padding:4px;margin-bottom:24px;gap:4px;}
.tab-btn{flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;letter-spacing:1px;background:transparent;color:var(--muted);transition:.2s;}
.tab-btn.active{background:var(--accent);color:#000;}
.form-group{margin-bottom:14px;}
.form-group input{width:100%;padding:13px 16px;background:var(--bg4);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;outline:none;transition:.2s;}
.form-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,255,.1);}
.form-group input::placeholder{color:var(--muted);}
.auth-btn{width:100%;padding:14px;background:linear-gradient(135deg,#00e5ff,#00bcd4);border:none;border-radius:10px;cursor:pointer;font-family:'Orbitron',monospace;font-size:14px;font-weight:700;letter-spacing:2px;color:#000;transition:.2s;margin-top:8px;}
.auth-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,229,255,.4);}
.err-msg{color:var(--red);font-size:13px;margin-top:6px;text-align:center;min-height:18px;}
.auth-footer{text-align:center;margin-top:16px;color:var(--muted);font-size:13px;}

/* ══ GAME PAGE ══ */
#page-game{flex-direction:column;}
.navbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:10px;}
.nav-logo-icon{width:38px;height:38px;background:linear-gradient(135deg,#00e5ff,#7c4dff);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.nav-logo-text{font-family:'Orbitron',monospace;font-size:15px;font-weight:900;color:var(--accent);letter-spacing:1px;}
.nav-logo-sub{font-size:11px;color:var(--muted);}
.nav-right{display:flex;align-items:center;gap:12px;}
.wallet-box{background:var(--bg4);border:1px solid var(--border);border-radius:10px;padding:8px 16px;text-align:right;}
.wallet-label{font-size:10px;color:var(--muted);letter-spacing:2px;}
.wallet-val{font-size:18px;font-weight:700;color:var(--green);font-family:'Orbitron',monospace;}
.logout-btn{padding:8px 18px;background:rgba(255,23,68,.15);border:1px solid rgba(255,23,68,.4);border-radius:8px;color:var(--red);cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;transition:.2s;}
.logout-btn:hover{background:rgba(255,23,68,.3);}

.game-layout{display:flex;flex:1;overflow:hidden;}

/* ══ LEFT PANEL ══ */
.left-panel{width:280px;min-width:280px;background:var(--bg2);border-right:1px solid var(--border);padding:18px;overflow-y:auto;display:flex;flex-direction:column;gap:14px;}
.panel-section{background:var(--bg3);border-radius:12px;padding:16px;border:1px solid var(--border);}
.section-title{font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:10px;text-transform:uppercase;}

.mode-tabs{display:flex;background:var(--bg4);border-radius:8px;padding:3px;gap:3px;}
.mode-tab{flex:1;padding:8px;border:none;border-radius:6px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;background:transparent;color:var(--muted);transition:.2s;}
.mode-tab.active{background:var(--accent);color:#000;}

.bet-label{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:8px;}
.bet-input-wrap{display:flex;align-items:center;background:var(--bg4);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.bet-input{flex:1;padding:12px 14px;background:transparent;border:none;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:600;outline:none;}
.bet-multipliers{display:flex;border-left:1px solid var(--border);}
.bet-mult-btn{padding:0 12px;height:100%;border:none;border-right:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;transition:.2s;}
.bet-mult-btn:last-child{border-right:none;}
.bet-mult-btn:hover{background:var(--bg3);color:var(--text);}

/* Total Profit box — shows current round live profit */
.profit-section{background:var(--bg3);border-radius:12px;padding:16px;border:1px solid var(--border);}
.profit-top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.profit-label-text{font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.profit-mult-badge{font-size:12px;color:var(--muted);font-family:'Orbitron',monospace;}
.profit-currency-row{display:flex;align-items:stretch;gap:8px;width:100%;}
.profit-val-input{
  flex:1;min-width:0;padding:10px 14px;background:var(--bg4);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-family:'Orbitron',monospace;
  font-size:16px;font-weight:700;outline:none;pointer-events:none;box-sizing:border-box;
}
.flag-box{width:40px;height:40px;border-radius:8px;background:var(--bg4);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}

.bet-btn{width:100%;padding:14px;background:linear-gradient(135deg,#00e5ff,#00bcd4);border:none;border-radius:10px;cursor:pointer;font-family:'Orbitron',monospace;font-size:14px;font-weight:700;letter-spacing:2px;color:#000;transition:.2s;margin-top:4px;}
.bet-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,229,255,.4);}
.bet-btn:disabled{opacity:.4;cursor:not-allowed;transform:none !important;}

.auto-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.auto-label{font-size:13px;color:var(--muted);}
.auto-input{width:80px;padding:6px 10px;background:var(--bg4);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;outline:none;text-align:right;}
.auto-input:focus{border-color:var(--accent);}
.stop-btn{width:100%;padding:12px;background:rgba(255,23,68,.15);border:1px solid rgba(255,23,68,.4);border-radius:10px;color:var(--red);cursor:pointer;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:2px;transition:.2s;}
.stop-btn:hover{background:rgba(255,23,68,.3);}

/* ══ RIGHT PANEL ══ */
.right-panel{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;}

/* ══ GAME ARENA — Stake exact 3-zone layout ══ */
.game-arena{
  background:var(--bg3);border:1px solid var(--border);border-radius:16px;
  overflow:hidden;display:flex;flex-direction:column;min-height:520px;
}

/* ── ZONE 1: Computer cards (top) ── */
.zone-computer{
  flex:1.2;padding:20px 24px 12px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  border-bottom:1px solid var(--border);background:rgba(0,0,0,.15);position:relative;
}
.zone-lbl{font-size:9px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;}

/* Sliding window of 5 cards */
.comp-cards-row{display:flex;gap:10px;align-items:flex-end;justify-content:center;}

.comp-card{
  width:76px;height:104px;border-radius:10px;border:2px solid var(--border);
  background:var(--bg4);display:flex;align-items:center;justify-content:center;
  font-size:0;transition:.35s;flex-shrink:0;position:relative;overflow:hidden;
}
/* Hidden / face-down */
.comp-card.hidden{
  background:linear-gradient(145deg,#0f2744,#0a1b30);
  border-color:#1a3a5c;
}
.comp-card.hidden::before{
  content:'';position:absolute;inset:8px;border-radius:6px;
  border:1.5px solid rgba(0,229,255,.2);
  background:repeating-linear-gradient(45deg,rgba(0,229,255,.03),rgba(0,229,255,.03) 3px,transparent 3px,transparent 10px);
}
/* Center (active) card is slightly bigger */
.comp-card.is-center{width:92px;height:124px;font-size:0;border-color:rgba(0,229,255,.35);}
.comp-card.is-center.hidden::before{inset:10px;}

/* Revealed states */
.comp-card.revealed{font-size:36px;}
.comp-card.is-center.revealed{font-size:44px;}
.comp-card.border-win{border-color:var(--green) !important;box-shadow:0 0 20px rgba(0,230,118,.5);}
.comp-card.border-lose{border-color:var(--red) !important;box-shadow:0 0 16px rgba(255,23,68,.35);}
.comp-card.border-draw{border-color:var(--gold) !important;box-shadow:0 0 16px rgba(255,214,0,.35);}
.comp-card.past-reveal{font-size:30px;opacity:.7;}

/* Multiplier labels under each card */
.mult-labels-row{display:flex;gap:10px;align-items:center;justify-content:center;}
.mult-lbl{
  width:76px;text-align:center;font-size:11px;font-weight:700;
  color:var(--muted);font-family:'Orbitron',monospace;letter-spacing:.5px;
}
.mult-lbl.is-center{width:92px;font-size:13px;color:var(--accent);}
.mult-lbl.is-won{color:var(--green);}

/* Idle overlay */
.idle-overlay{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
  background:rgba(13,17,23,.75);z-index:5;
}
.idle-emoji{font-size:52px;letter-spacing:6px;}
.idle-txt{font-family:'Orbitron',monospace;font-size:12px;color:var(--muted);letter-spacing:2px;}

/* ── ZONE 2: Player card + result centre ── */
.zone-middle{
  padding:14px 24px;min-height:80px;
  display:flex;align-items:center;justify-content:center;gap:20px;
  border-bottom:1px solid var(--border);
}
.player-card{
  width:68px;height:90px;border-radius:10px;border:2px solid var(--border);
  background:var(--bg4);display:flex;align-items:center;justify-content:center;
  font-size:0;transition:.3s;flex-shrink:0;
}
.player-card.show{font-size:36px;border-color:var(--accent);background:rgba(0,229,255,.07);}
.player-card.empty::after{content:'?';font-size:22px;color:var(--muted);font-family:'Orbitron',monospace;}

.result-block{text-align:center;}
.result-headline{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;letter-spacing:2px;}
.result-headline.win{color:var(--green);}
.result-headline.lose{color:var(--red);}
.result-headline.draw{color:var(--gold);}
.result-sub{font-size:13px;color:var(--muted);margin-top:3px;}
.action-row{display:flex;gap:8px;margin-top:10px;justify-content:center;flex-wrap:wrap;}
.cashout-btn{
  padding:10px 20px;background:linear-gradient(135deg,var(--green),#00c853);
  border:none;border-radius:8px;cursor:pointer;
  font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:1px;color:#000;transition:.2s;
}
.cashout-btn:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,230,118,.4);}
.next-btn{
  padding:10px 20px;background:linear-gradient(135deg,#00e5ff,#00bcd4);
  border:none;border-radius:8px;cursor:pointer;
  font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:1px;color:#000;transition:.2s;
}
.next-btn:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,229,255,.4);}

/* ── ZONE 3: Player pick buttons (bottom) ── */
.zone-pick{
  padding:18px 24px;display:flex;align-items:center;justify-content:center;gap:16px;
  flex-wrap:wrap;
}
.pick-btn{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  width:96px;padding:16px 10px;
  background:linear-gradient(160deg,#162616,#0e1a0e);
  border:2px solid #274027;border-radius:14px;cursor:pointer;
  font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:#4ade80;
  transition:.25s;
}
.pick-btn .picon{font-size:38px;}
.pick-btn:hover:not(:disabled){transform:translateY(-4px);border-color:var(--green);box-shadow:0 8px 24px rgba(0,230,118,.3);}
.pick-btn:disabled{opacity:.3;cursor:not-allowed;transform:none !important;}
.pick-btn.glow{animation:btnGlow 2s ease-in-out infinite;}
@keyframes btnGlow{0%,100%{border-color:#274027}50%{border-color:#4ade80;box-shadow:0 0 14px rgba(74,222,128,.25)}}

.rnd-btn{
  padding:8px 16px;border-radius:8px;border:1px solid var(--border);
  background:var(--bg4);color:var(--muted);cursor:pointer;
  font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;transition:.2s;
}
.rnd-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.rnd-btn:disabled{opacity:.3;cursor:not-allowed;}

/* History */
.hist-section{margin-top:0;}
.hist-title{font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;}
.hist-row{display:flex;gap:6px;flex-wrap:wrap;}
.hist-pill{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:16px;}
.hist-pill.win{border-color:var(--green);background:rgba(0,230,118,.1);}
.hist-pill.lose{border-color:var(--red);background:rgba(255,23,68,.1);}
.hist-pill.draw{border-color:var(--gold);background:rgba(255,214,0,.08);}

/* Flip animation */
@keyframes flipIn{0%{transform:rotateY(90deg);opacity:0}100%{transform:rotateY(0);opacity:1}}
.flip-in{animation:flipIn .35s ease forwards;}

/* Toast */
.toast-wrap{position:fixed;top:80px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:14px;font-weight:600;letter-spacing:.5px;animation:slideIn .3s ease;max-width:260px;}
.toast.win{border-color:var(--green);color:var(--green);}
.toast.lose{border-color:var(--red);color:var(--red);}
.toast.info{border-color:var(--accent);color:var(--accent);}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}

@media(max-width:800px){
  .game-layout{flex-direction:column;}
  .left-panel{width:100%;min-width:auto;}
  .comp-card{width:56px;height:78px;}
  .comp-card.is-center{width:72px;height:98px;}
  .pick-btn{width:76px;padding:12px 6px;}
  .pick-btn .picon{font-size:30px;}
}
</style>
</head>
<body>

<!-- ══ AUTH ══ -->
<div id="page-auth" class="page active">
  <div class="auth-card">
    <div class="logo-wrap">
      <div class="logo-icon">✊</div>
      <div class="logo-title">ROCK PAPER<br>SCISSORS ARENA</div>
      <div class="logo-sub">RL POWERED</div>
    </div>
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <div class="form-group"><input id="inp-email" type="email" placeholder="Email" autocomplete="off"></div>
    <div class="form-group"><input id="inp-pass" type="password" placeholder="Password"></div>
    <div id="auth-err" class="err-msg"></div>
    <button class="auth-btn" id="auth-submit" onclick="handleAuth()">LOGIN</button>
    <div class="auth-footer">RL Powered RPS Game</div>
  </div>
</div>

<!-- ══ GAME PAGE ══ -->
<div id="page-game" class="page">
  <nav class="navbar">
    <div class="nav-logo">
      <div class="nav-logo-icon">✊</div>
      <div>
        <div class="nav-logo-text">RPS ARENA</div>
        <div class="nav-logo-sub">Hey, <span id="nav-user"></span></div>
      </div>
    </div>
    <div class="nav-right">
      <div class="wallet-box">
        <div class="wallet-label">BALANCE</div>
        <div class="wallet-val" id="bal-display">₹10,000.00</div>
      </div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="game-layout">

    <!-- LEFT PANEL -->
    <div class="left-panel">
      <div class="panel-section">
        <div class="mode-tabs">
          <button class="mode-tab active" onclick="setMode('manual')">Manual</button>
          <button class="mode-tab" onclick="setMode('auto')">Auto (RL)</button>
        </div>
      </div>

      <div class="panel-section">
        <div class="bet-label"><span>Bet Amount</span><span id="bet-disp">₹100.00</span></div>
        <div class="bet-input-wrap">
          <input class="bet-input" id="bet-inp" type="number" value="100" min="1" oninput="onBetInput()">
          <div class="bet-multipliers">
            <button class="bet-mult-btn" onclick="multBet(.5)">½</button>
            <button class="bet-mult-btn" onclick="multBet(2)">2×</button>
          </div>
        </div>
      </div>

      <!-- Total Profit — live current-bet profit -->
      <div class="profit-section">
        <div class="profit-top-row">
          <span class="profit-label-text">Total Profit</span>
          <span class="profit-mult-badge" id="profit-mult">(1.00×)</span>
        </div>
        <div class="profit-currency-row">
          <input class="profit-val-input" id="profit-val" type="text" value="0.00" readonly>
          <div class="flag-box">🇮🇳</div>
        </div>
      </div>

      <div id="sec-manual" class="panel-section">
        <button class="bet-btn" id="main-bet-btn" onclick="initRound()">BET</button>
      </div>

      <div id="sec-auto" class="panel-section" style="display:none">
        <div class="section-title">RL Auto Settings</div>
        <div class="auto-row"><span class="auto-label">Rounds</span><input class="auto-input" id="auto-rds" type="number" value="20" min="1" max="100"></div>
        <div class="auto-row"><span class="auto-label">Stop loss (₹)</span><input class="auto-input" id="auto-sl" type="number" value="500"></div>
        <button class="bet-btn" id="auto-start-btn" onclick="startAuto()">START RL BOT</button>
        <button class="stop-btn" id="auto-stop-btn" onclick="stopAuto()" style="display:none;margin-top:8px">⏹ STOP BOT</button>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">

      <div class="game-arena">

        <!-- ZONE 1: Computer's hidden/revealed cards -->
        <div class="zone-computer" id="zone-computer">
          <div class="idle-overlay" id="idle-overlay">
            <div class="idle-emoji">✊ ✋ ✌️</div>
            <div class="idle-txt">Enter bet &amp; click BET to start</div>
          </div>
          <div class="zone-lbl">COMPUTER</div>
          <div class="comp-cards-row" id="comp-cards-row"></div>
          <div class="mult-labels-row" id="mult-labels-row"></div>
        </div>

        <!-- ZONE 2: Player's chosen card + result -->
        <div class="zone-middle" id="zone-middle">
          <div class="player-card empty" id="player-card"></div>
          <div class="result-block" id="result-block" style="display:none">
            <div class="result-headline" id="res-headline"></div>
            <div class="result-sub" id="res-sub"></div>
            <div class="action-row" id="action-row"></div>
          </div>
        </div>

        <!-- ZONE 3: Pick buttons -->
        <div class="zone-pick" id="zone-pick">
          <button class="pick-btn glow" id="btn-rock" onclick="playMove('rock')" disabled>
            <span class="picon">✊</span>Rock
          </button>
          <button class="pick-btn glow" id="btn-paper" onclick="playMove('paper')" disabled>
            <span class="picon">✋</span>Paper
          </button>
          <button class="pick-btn glow" id="btn-scissors" onclick="playMove('scissors')" disabled>
            <span class="picon">✌️</span>Scissors
          </button>
          <button class="rnd-btn" id="btn-random" onclick="playMove(rndPick())" disabled>⚡ Random</button>
        </div>

      </div>

      <!-- History -->
      <div class="hist-section">
        <div class="hist-title">Round History</div>
        <div class="hist-row" id="hist-row">
          <span style="color:var(--muted);font-size:13px">No rounds yet</span>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
// ══ STAKE EXACT MULTIPLIER TABLE ══
const MULT = [
  1.96, 3.84, 7.53, 14.76, 28.93,
  56.70, 111.13, 217.82, 426.93, 836.38,
  1639.31, 3213.05, 6297.58, 12343.26, 24192.79,
  47417.87, 92938.43, 182159.72, 357033.04, 1027604.48
];

const ICONS = {rock:'✊', paper:'✋', scissors:'✌️'};
const CHOICES = ['rock','paper','scissors'];
const CARD_ICON = ['🎯','⚡','🔥','💥','🌟','👑','💎','🚀','⚜️','🏆','🌈','🎆','🌠','🏅','🎖️','🥇','💫','✨','🌌','👑'];

let currentUser = null, authMode = 'login', gameMode = 'manual';
let roundActive = false, currentBet = 0, roundWins = 0;
let compMoves = [];   // stores revealed computer moves per round win
let autoRunning = false, autoTimer = null;

const DB = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } },
  set: (k,v) => localStorage.setItem(k, JSON.stringify(v)),
};

// ══ RL AGENT ══
const RL = {
  q:{}, alpha:.3, gamma:.9, eps:.2, hist:[], games:0,
  getState(){ return this.hist.slice(-3).join(',')||'start'; },
  getAction(state){
    if(!this.q[state]) this.q[state]={rock:0,paper:0,scissors:0};
    const e=Math.max(0.05,this.eps-this.games*0.005);
    if(Math.random()<e) return CHOICES[Math.floor(Math.random()*3)];
    const q=this.q[state]; return Object.keys(q).reduce((a,b)=>q[a]>=q[b]?a:b);
  },
  counter(m){ return m==='rock'?'paper':m==='paper'?'scissors':'rock'; },
  pickHouse(pm){
    const state=this.getState(), pred=this.getAction(state), house=this.counter(pred);
    this.hist.push(pm); this.games++;
    const next=this.getState(), res=gameResult(pm,house);
    const reward=res==='lose'?1:res==='win'?-1:0;
    if(!this.q[next]) this.q[next]={rock:0,paper:0,scissors:0};
    const maxN=Math.max(...Object.values(this.q[next]));
    this.q[state][pred]+=this.alpha*(reward+this.gamma*maxN-this.q[state][pred]);
    return house;
  }
};

function gameResult(p,h){
  if(p===h) return 'draw';
  if((p==='rock'&&h==='scissors')||(p==='paper'&&h==='rock')||(p==='scissors'&&h==='paper')) return 'win';
  return 'lose';
}
function rndPick(){ return CHOICES[Math.floor(Math.random()*3)]; }

// ══ AUTH ══
function switchTab(mode){
  authMode=mode;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&mode==='login')||(i===1&&mode==='signup')));
  document.getElementById('auth-submit').textContent=mode==='login'?'LOGIN':'CREATE ACCOUNT';
  document.getElementById('auth-err').textContent='';
}
function handleAuth(){
  const email=document.getElementById('inp-email').value.trim().toLowerCase();
  const pass=document.getElementById('inp-pass').value;
  const err=document.getElementById('auth-err');
  err.textContent='';
  if(!email||!pass){err.textContent='Please fill in email and password.';return;}
  if(!/^[^@]+@[^@]+\.[^@]+$/.test(email)){err.textContent='Please enter a valid email address.';return;}
  if(pass.length<4){err.textContent='Password must be at least 4 characters.';return;}
  const users=DB.get('rps_users')||{};
  if(authMode==='signup'){
    if(users[email]){err.textContent='Email already registered. Please login.';return;}
    users[email]={pass,balance:10000,profit:0,wins:0,losses:0,draws:0};
    DB.set('rps_users',users);
    currentUser=email; DB.set('rps_session',email);
    showToast('Account created! ₹10,000 added.','info'); loadGame(); return;
  }
  if(!users[email]){err.textContent='Email not found. Please sign up first.';return;}
  if(users[email].pass!==pass){err.textContent='Incorrect password.';return;}
  currentUser=email; DB.set('rps_session',email); loadGame();
}
function logout(){
  stopAuto(); DB.set('rps_session',null); currentUser=null;
  roundActive=false; currentBet=0; roundWins=0; compMoves=[];
  RL.hist=[]; RL.games=0; RL.q={};
  document.getElementById('page-game').classList.remove('active');
  document.getElementById('page-auth').classList.add('active');
  document.getElementById('inp-email').value='';
  document.getElementById('inp-pass').value='';
  document.getElementById('auth-err').textContent='';
}
function loadGame(){
  const u=(DB.get('rps_users')||{})[currentUser];
  document.getElementById('page-auth').classList.remove('active');
  document.getElementById('page-game').classList.add('active');
  document.getElementById('nav-user').textContent=currentUser.split('@')[0];
  updateBal(isNaN(u.balance)?10000:u.balance); onBetInput(); renderCardWindow(); showIdle();
}

// ══ HELPERS ══
function getU(){ return (DB.get('rps_users')||{})[currentUser]; }
function saveU(u){ const users=DB.get('rps_users')||{}; users[currentUser]=u; DB.set('rps_users',users); }
function updateBal(b){
  if(isNaN(b)||b===undefined||b===null) b=10000;
  if(b<=0){
    // Reset to 10k if balance is gone
    b=10000;
    const u=getU();
    if(u){ u.balance=10000; saveU(u); }
  }
  document.getElementById('bal-display').textContent='₹'+parseFloat(b).toFixed(2);
}
function onBetInput(){
  const v=parseFloat(document.getElementById('bet-inp').value)||0;
  document.getElementById('bet-disp').textContent='₹'+v.toFixed(2);
}
function multBet(x){
  const inp=document.getElementById('bet-inp');
  inp.value=Math.max(1,Math.floor(parseFloat(inp.value||0)*x)); onBetInput();
}
function setMode(m){
  gameMode=m;
  document.querySelectorAll('.mode-tab').forEach((b,i)=>b.classList.toggle('active',(i===0&&m==='manual')||(i===1&&m==='auto')));
  document.getElementById('sec-manual').style.display=m==='manual'?'':'none';
  document.getElementById('sec-auto').style.display=m==='auto'?'':'none';
}
function setPickEnabled(en){
  ['btn-rock','btn-paper','btn-scissors','btn-random'].forEach(id=>{
    const b=document.getElementById(id); b.disabled=!en;
    en ? b.classList.add('glow') : b.classList.remove('glow');
  });
}

// ══ PROFIT BOX ══
// Shows live profit for the current bet at the current stage
function updateProfitBox(wins, bet){
  const ml=document.getElementById('profit-mult');
  const pv=document.getElementById('profit-val');
  if(!roundActive || wins===0){
    ml.textContent='(1.00×)'; pv.value='0.00'; pv.style.color='var(--text)'; return;
  }
  const mult=MULT[Math.min(wins-1,MULT.length-1)];
  const profit=(bet*mult)-bet;
  ml.textContent=`(${mult}×)`;
  pv.value=profit.toFixed(2);
  pv.style.color='var(--green)';
}

// ══ CARD WINDOW ══
// Always show 5 cards: [center-2, center-1, CENTER, center+1, center+2]
// center = roundWins (0-indexed in MULT)
function renderCardWindow(){
  const cardsRow=document.getElementById('comp-cards-row');
  const multsRow=document.getElementById('mult-labels-row');
  cardsRow.innerHTML=''; multsRow.innerHTML='';

  const center = roundWins; // the current active slot

  for(let col=0;col<5;col++){
    const idx = center - 2 + col;   // MULT index for this column
    const isCenter = (col===2);
    const isPast   = (idx < center && idx >= 0 && idx < compMoves.length);
    const isValid  = (idx >= 0 && idx < MULT.length);

    // ── Card ──
    const card = document.createElement('div');
    card.className = 'comp-card' + (isCenter?' is-center':'');
    card.id = 'cc-'+col;

    if(isPast){
      // Previously revealed card — show the move
      card.classList.add('past-reveal');
      card.textContent = ICONS[compMoves[idx]] || '';
    } else if(isCenter && roundActive){
      // Current center — hidden until player picks
      card.classList.add('hidden');
    } else {
      // Future or pre-round — hidden
      card.classList.add('hidden');
    }
    cardsRow.appendChild(card);

    // ── Multiplier label ──
    const lbl=document.createElement('div');
    lbl.className='mult-lbl'+(isCenter?' is-center':'')+(isPast?' is-won':'');
    lbl.id='ml-'+col;
    lbl.textContent = isValid ? MULT[idx]+'×' : '';
    multsRow.appendChild(lbl);
  }
}

function showIdle(){
  document.getElementById('idle-overlay').style.display='flex';
  document.getElementById('player-card').className='player-card empty';
  document.getElementById('player-card').textContent='';
  document.getElementById('result-block').style.display='none';
  document.getElementById('action-row').innerHTML='';
  document.getElementById('main-bet-btn').disabled=false;
  setPickEnabled(false);
  updateProfitBox(0,0);
}

// ══ INIT ROUND ══
function initRound(){
  if(roundActive) return;
  const u=getU();
  const bet=parseFloat(document.getElementById('bet-inp').value)||0;
  if(bet<=0){showToast('Enter a valid bet amount.','info');return;}
  if(bet>u.balance){showToast('Insufficient balance!','lose');return;}

  currentBet=bet; roundWins=0; compMoves=[];
  u.balance-=bet; saveU(u); updateBal(u.balance);
  roundActive=true;

  document.getElementById('idle-overlay').style.display='none';
  document.getElementById('main-bet-btn').disabled=true;
  document.getElementById('player-card').className='player-card empty';
  document.getElementById('player-card').textContent='';
  document.getElementById('result-block').style.display='none';

  renderCardWindow();
  setPickEnabled(true);
  updateProfitBox(0, currentBet);
}

// ══ PLAY MOVE ══
function playMove(pm){
  if(!roundActive) return;
  setPickEnabled(false);

  const hm=RL.pickHouse(pm);
  compMoves[roundWins]=hm;
  const res=gameResult(pm,hm);

  // Show player card (zone 2)
  const pc=document.getElementById('player-card');
  pc.className='player-card show flip-in';
  pc.textContent=ICONS[pm];

  // Reveal center computer card after short delay
  const centerCard=document.getElementById('cc-2');
  setTimeout(()=>{
    if(centerCard){
      centerCard.classList.remove('hidden');
      centerCard.classList.add('revealed','flip-in');
      centerCard.textContent=ICONS[hm];
      centerCard.classList.add(res==='win'?'border-win':res==='lose'?'border-lose':'border-draw');
    }
  }, 380);

  const u=getU();
  const rb=document.getElementById('result-block');
  const rh=document.getElementById('res-headline');
  const rs=document.getElementById('res-sub');
  const ar=document.getElementById('action-row');
  ar.innerHTML='';

  setTimeout(()=>{
    rb.style.display='block';

    if(res==='win'){
      roundWins++;
      const mult=MULT[Math.min(roundWins-1,MULT.length-1)];
      const payout=parseFloat((currentBet*mult).toFixed(2));
      const profit=payout-currentBet;

      rh.className='result-headline win'; rh.textContent='YOU WIN!';
      rs.textContent=`Cash out now for ₹${payout.toFixed(2)} (${mult}×)`;

      u.wins=(u.wins||0)+1; u.profit=(u.profit||0)+profit; saveU(u);
      updateProfitBox(roundWins, currentBet);
      addHist(pm,hm,'win');
      showToast(`Win! Potential payout: ₹${payout.toFixed(2)}`,'win');

      if(roundWins>=20){ doCashout(); return; }

      // Cashout / Continue
      const co=document.createElement('button');
      co.className='cashout-btn';
      co.textContent=`CASH OUT ₹${payout.toFixed(2)}`;
      co.onclick=doCashout;

      const cnt=document.createElement('button');
      cnt.className='next-btn'; cnt.textContent='CONTINUE';
      cnt.onclick=()=>{
        renderCardWindow();
        pc.className='player-card empty'; pc.textContent='';
        rb.style.display='none'; ar.innerHTML='';
        setPickEnabled(true);
      };
      ar.appendChild(co); ar.appendChild(cnt);

    } else if(res==='lose'){
      rh.className='result-headline lose'; rh.textContent='YOU LOSE';
      rs.textContent=`Lost ₹${currentBet.toFixed(2)}`;
      u.losses=(u.losses||0)+1; u.profit=(u.profit||0)-currentBet; saveU(u);
      updateBal(u.balance); updateProfitBox(0,0);
      addHist(pm,hm,'lose');
      showToast(`Loss! -₹${currentBet.toFixed(2)}`,'lose');
      endRound();

      const nb=document.createElement('button');
      nb.className='next-btn'; nb.textContent='NEW ROUND';
      nb.onclick=()=>showIdle();
      ar.appendChild(nb);

    } else {
      // Draw — no penalty, pick again
      rh.className='result-headline draw'; rh.textContent='DRAW';
      rs.textContent='No penalty — pick again!';
      u.draws=(u.draws||0)+1; saveU(u);
      addHist(pm,hm,'draw');

      const cnt=document.createElement('button');
      cnt.className='next-btn'; cnt.textContent='PICK AGAIN';
      cnt.onclick=()=>{
        pc.className='player-card empty'; pc.textContent='';
        rb.style.display='none'; ar.innerHTML='';
        // Re-render center card as hidden for next pick
        renderCardWindow();
        setPickEnabled(true);
      };
      ar.appendChild(cnt);
    }
  }, 680);
}

// ══ CASHOUT ══
function doCashout(){
  if(!roundActive) return;
  const mult=MULT[Math.min(roundWins-1,MULT.length-1)];
  const payout=parseFloat((currentBet*mult).toFixed(2));
  const profit=payout-currentBet;
  const u=getU(); u.balance+=payout; saveU(u); updateBal(u.balance);

  const rh=document.getElementById('res-headline');
  const rs=document.getElementById('res-sub');
  const ar=document.getElementById('action-row');
  document.getElementById('result-block').style.display='block';
  rh.className='result-headline win'; rh.textContent='CASHED OUT!';
  rs.textContent=`+₹${profit.toFixed(2)} profit`;
  ar.innerHTML='';
  const nb=document.createElement('button');
  nb.className='next-btn'; nb.textContent='NEW ROUND';
  nb.onclick=()=>showIdle();
  ar.appendChild(nb);

  showToast(`Cashed out ₹${payout.toFixed(2)}! Profit: +₹${profit.toFixed(2)}`,'win');
  updateProfitBox(0,0);
  endRound();
}

function endRound(){
  roundActive=false; currentBet=0;
  document.getElementById('main-bet-btn').disabled=false;
  setPickEnabled(false);
}

// ══ HISTORY ══
function addHist(pm,hm,res){
  const row=document.getElementById('hist-row');
  if(row.children[0]?.tagName==='SPAN') row.innerHTML='';
  const item=document.createElement('div');
  item.className='hist-pill '+res;
  item.title=`You: ${pm} | Computer: ${hm}`;
  item.textContent=ICONS[pm]||'?';
  row.insertBefore(item,row.firstChild);
  if(row.children.length>30) row.removeChild(row.lastChild);
}

// ══ AUTO ══
function startAuto(){
  if(autoRunning) return; autoRunning=true;
  let done=0;
  const maxRds=parseInt(document.getElementById('auto-rds').value)||20;
  const stopLoss=parseFloat(document.getElementById('auto-sl').value)||500;
  const startBal=getU().balance;
  document.getElementById('auto-start-btn').style.display='none';
  document.getElementById('auto-stop-btn').style.display='';
  function runNext(){
    if(!autoRunning||done>=maxRds){stopAuto();showToast('Auto run complete!','info');return;}
    const u=getU();
    if(startBal-u.balance>=stopLoss){stopAuto();showToast('Stop-loss hit!','lose');return;}
    const bet=parseFloat(document.getElementById('bet-inp').value)||0;
    if(u.balance<bet){stopAuto();showToast('Insufficient balance.','lose');return;}
    initRound();
    setTimeout(()=>{playMove(rndPick());
      setTimeout(()=>{if(roundActive)doCashout(); done++; autoTimer=setTimeout(runNext,1700);},900);
    },500);
  }
  runNext();
}
function stopAuto(){
  autoRunning=false; if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}
  document.getElementById('auto-start-btn').style.display='';
  document.getElementById('auto-stop-btn').style.display='none';
  if(roundActive) endRound();
}

// ══ TOAST ══
function showToast(msg,type='info'){
  const wrap=document.getElementById('toast-wrap');
  const t=document.createElement('div');
  t.className='toast '+type; t.textContent=msg;
  wrap.appendChild(t); setTimeout(()=>t.remove(),3000);
}

// ══ BOOT ══
(function(){
  const sess=DB.get('rps_session');
  if(sess){const users=DB.get('rps_users')||{};if(users[sess]){currentUser=sess;loadGame();return;}DB.set('rps_session',null);}
  document.getElementById('page-auth').classList.add('active');
  onBetInput();
})();
</script>
